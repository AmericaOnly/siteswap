name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_ZEROX_PROXY_URL: https://electrumx-verge.cloud/widget/
          VITE_ZEROX_FEE_BPS: ${{ secrets.VITE_ZEROX_FEE_BPS || vars.VITE_ZEROX_FEE_BPS }}
          VITE_ZEROX_FEE_RECIPIENT: ${{ secrets.VITE_ZEROX_FEE_RECIPIENT || vars.VITE_ZEROX_FEE_RECIPIENT }}
          VITE_ZEROX_FEE_TOKEN: ${{ secrets.VITE_ZEROX_FEE_TOKEN || vars.VITE_ZEROX_FEE_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
